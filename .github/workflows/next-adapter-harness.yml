name: next-adapter-harness

on:
  workflow_dispatch:
    inputs:
      nextjsRef:
        description: Next.js repo ref, branch, tag, or SHA
        default: canary
        type: string
      group:
        description: Next e2e shard group
        default: 1/64
        type: string
      turbopack:
        description: Run the shard in Next's Turbopack test mode
        default: false
        type: boolean
  schedule:
    - cron: '0 7 * * 1'

jobs:
  deploy-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXTJS_REF: ${{ github.event.inputs.nextjsRef || 'canary' }}
      NEXT_TEST_GROUP: ${{ github.event.inputs.group || '1/64' }}
    steps:
      - name: Checkout adapter
        uses: actions/checkout@v4
        with:
          path: adapter

      - name: Check brrrd runtime checkout secret
        env:
          RUNTIME_REPO_DEPLOY_KEY: ${{ secrets.RUNTIME_REPO_DEPLOY_KEY }}
        run: |
          if [ -z "$RUNTIME_REPO_DEPLOY_KEY" ]; then
            echo "::error::RUNTIME_REPO_DEPLOY_KEY is required to checkout private burrr-ai/brrrd"
            exit 1
          fi

      - name: Checkout brrrd runtime
        uses: actions/checkout@v4
        with:
          repository: burrr-ai/brrrd
          path: brrrd
          ssh-key: ${{ secrets.RUNTIME_REPO_DEPLOY_KEY }}
          persist-credentials: false
          submodules: recursive

      - name: Checkout Next.js
        uses: actions/checkout@v4
        with:
          repository: vercel/next.js
          ref: ${{ env.NEXTJS_REF }}
          path: nextjs
          fetch-depth: 25

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm i -g corepack@0.31 && corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and test adapter
        working-directory: adapter
        run: npm install && npm run build && npm test

      - name: Build brrrd runtime
        working-directory: brrrd
        run: cargo build -p brrrd --bin brrrd

      - name: Install and build Next.js
        working-directory: nextjs
        run: pnpm install && pnpm build && pnpm install

      - name: Install Playwright Chromium
        working-directory: nextjs
        run: pnpm playwright install --with-deps chromium

      - name: Make harness scripts executable
        run: chmod +x adapter/scripts/e2e-deploy.sh adapter/scripts/e2e-logs.sh adapter/scripts/e2e-cleanup.sh

      - name: Run official deploy adapter tests
        working-directory: nextjs
        timeout-minutes: 30
        env:
          ADAPTER_DIR: ${{ github.workspace }}/adapter
          BRRRD_BIN: ${{ github.workspace }}/brrrd/target/debug/brrrd
          NEXT_TEST_MODE: deploy
          NEXT_E2E_TEST_TIMEOUT: 240000
          NEXT_EXTERNAL_TESTS_FILTERS: test/deploy-tests-manifest.json
          NEXT_TEST_DEPLOY_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-deploy.sh
          NEXT_TEST_DEPLOY_LOGS_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-logs.sh
          NEXT_TEST_CLEANUP_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-cleanup.sh
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_TEST_JOB: 1
          BRRRD_HARNESS_TURBOPACK: ${{ github.event.inputs.turbopack || 'false' }}
        run: |
          set -o pipefail
          if [ "$BRRRD_HARNESS_TURBOPACK" = "true" ]; then
            export IS_TURBOPACK_TEST=1
          fi
          node run-tests.js --timings -g "$NEXT_TEST_GROUP" -c 2 --type e2e 2>&1 \
            | tee "$GITHUB_WORKSPACE/next-adapter-harness.log"

      - name: Collect harness diagnostics
        if: always()
        working-directory: nextjs
        run: |
          mkdir -p "$GITHUB_WORKSPACE/harness-diagnostics"
          if [ -f "$GITHUB_WORKSPACE/next-adapter-harness.log" ]; then
            cp "$GITHUB_WORKSPACE/next-adapter-harness.log" "$GITHUB_WORKSPACE/harness-diagnostics/next-adapter-harness.log"
          fi

          while IFS= read -r -d '' file; do
            dest="$GITHUB_WORKSPACE/harness-diagnostics/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
            echo "::group::$file"
            tail -200 "$file" || true
            echo "::endgroup::"
          done < <(find . -type f \( -name '.adapter-build.log' -o -name '.adapter-server.log' -o -path '*/.brrrd-harness/deployment.json' \) -print0)

          while IFS= read -r -d '' file; do
            dest="$GITHUB_WORKSPACE/harness-diagnostics/tmp-next-tests/${file#/tmp/}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
            echo "::group::$file"
            tail -200 "$file" || true
            echo "::endgroup::"
          done < <(find /tmp -maxdepth 4 -type f \( -name '.adapter-build.log' -o -name '.adapter-server.log' -o -path '*/.brrrd-harness/deployment.json' \) -print0)

      - name: Upload harness diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-adapter-harness-diagnostics
          path: harness-diagnostics
          if-no-files-found: ignore
