name: next-adapter-harness

on:
  workflow_dispatch:
    inputs:
      nextjsRef:
        description: Next.js repo ref, branch, tag, or SHA
        default: canary
        type: string
      group:
        description: Next e2e shard group
        default: 1/64
        type: string
      bundler:
        description: Bundler axis for Next deploy tests
        default: webpack
        type: choice
        options:
          - webpack
          - turbopack
          - next-default
  schedule:
    - cron: '0 7 * * 1'

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.plan.outputs.shards }}
      bundler: ${{ steps.plan.outputs.bundler }}
      cache_key: ${{ steps.plan.outputs.cache_key }}
    steps:
      - id: plan
        env:
          INPUT_GROUP: ${{ github.event.inputs.group || '1/64' }}
          INPUT_BUNDLER: ${{ github.event.inputs.bundler || 'webpack' }}
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const rawGroup = (process.env.INPUT_GROUP || "1/64").trim();
          const bundler = (process.env.INPUT_BUNDLER || "webpack").trim();
          const allowedBundlers = new Set(["webpack", "turbopack", "next-default"]);
          if (!allowedBundlers.has(bundler)) {
            throw new Error(`Unsupported bundler: ${bundler}`);
          }

          const parseGroup = (group) => {
            const match = /^([1-9]\d*)\/([1-9]\d*)$/.exec(group);
            if (!match) {
              throw new Error(`Invalid group "${group}". Use n/m, comma-separated n/m values, or all.`);
            }
            const index = Number(match[1]);
            const total = Number(match[2]);
            if (index > total) {
              throw new Error(`Invalid group "${group}": index must be <= total.`);
            }
            return { group, label: `${index}-of-${total}` };
          };

          const groups =
            rawGroup === "all"
              ? Array.from({ length: 64 }, (_, index) => `${index + 1}/64`)
              : rawGroup.split(",").map((group) => group.trim()).filter(Boolean);

          if (groups.length === 0) {
            throw new Error("At least one group is required.");
          }

          const shards = groups.map(parseGroup);
          const unique = new Set();
          const deduped = [];
          for (const shard of shards) {
            if (!unique.has(shard.group)) {
              unique.add(shard.group);
              deduped.push(shard);
            }
          }

          const output = [
            `shards=${JSON.stringify(deduped)}`,
            `bundler=${bundler}`,
            `cache_key=next-adapter-harness-${process.env.GITHUB_SHA}-${process.env.GITHUB_RUN_ID}-${process.env.GITHUB_RUN_ATTEMPT}`,
          ].join("\n") + "\n";
          fs.appendFileSync(process.env.GITHUB_OUTPUT, output);
          EOF

  build:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXTJS_REF: ${{ github.event.inputs.nextjsRef || 'canary' }}
    steps:
      - name: Checkout adapter
        uses: actions/checkout@v4
        with:
          path: adapter

      - name: Check brrrd runtime checkout secret
        env:
          RUNTIME_REPO_DEPLOY_KEY: ${{ secrets.RUNTIME_REPO_DEPLOY_KEY }}
        run: |
          if [ -z "$RUNTIME_REPO_DEPLOY_KEY" ]; then
            echo "::error::RUNTIME_REPO_DEPLOY_KEY is required to checkout private burrr-ai/brrrd"
            exit 1
          fi

      - name: Checkout brrrd runtime
        uses: actions/checkout@v4
        with:
          repository: burrr-ai/brrrd
          path: brrrd
          ssh-key: ${{ secrets.RUNTIME_REPO_DEPLOY_KEY }}
          persist-credentials: false
          submodules: recursive

      - name: Checkout Next.js
        uses: actions/checkout@v4
        with:
          repository: vercel/next.js
          ref: ${{ env.NEXTJS_REF }}
          path: nextjs
          fetch-depth: 25

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm i -g corepack@0.31 && corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and test adapter
        working-directory: adapter
        run: npm install && npm run build && npm test

      - name: Build brrrd runtime
        working-directory: brrrd
        run: cargo build -p brrrd --bin brrrd

      - name: Install and build Next.js
        working-directory: nextjs
        run: pnpm install && pnpm build && pnpm install

      - name: Install Playwright Chromium
        working-directory: nextjs
        run: pnpm playwright install --with-deps chromium

      - name: Save harness workspace
        uses: actions/cache/save@v4
        with:
          path: |
            nextjs
            adapter
            brrrd
            ~/.cache/ms-playwright
          key: ${{ needs.plan.outputs.cache_key }}

  test:
    name: Tests (${{ matrix.shard.group }}, ${{ needs.plan.outputs.bundler }})
    needs:
      - plan
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    env:
      NEXT_TEST_GROUP: ${{ matrix.shard.group }}
      BRRRD_HARNESS_BUNDLER: ${{ needs.plan.outputs.bundler }}
    steps:
      - name: Restore harness workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            nextjs
            adapter
            brrrd
            ~/.cache/ms-playwright
          key: ${{ needs.plan.outputs.cache_key }}
          fail-on-cache-miss: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm i -g corepack@0.31 && corepack enable

      - name: Make harness scripts executable
        run: chmod +x adapter/scripts/e2e-deploy.sh adapter/scripts/e2e-logs.sh adapter/scripts/e2e-cleanup.sh

      - name: Run official deploy adapter tests
        working-directory: nextjs
        timeout-minutes: 45
        env:
          ADAPTER_DIR: ${{ github.workspace }}/adapter
          BRRRD_BIN: ${{ github.workspace }}/brrrd/target/debug/brrrd
          NEXT_TEST_MODE: deploy
          NEXT_E2E_TEST_TIMEOUT: 240000
          NEXT_EXTERNAL_TESTS_FILTERS: test/deploy-tests-manifest.json
          NEXT_TEST_SKIP_RESULT_CACHE: 1
          NEXT_TEST_DEPLOY_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-deploy.sh
          NEXT_TEST_DEPLOY_LOGS_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-logs.sh
          NEXT_TEST_CLEANUP_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-cleanup.sh
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_TEST_JOB: 1
        run: |
          set -o pipefail
          case "$BRRRD_HARNESS_BUNDLER" in
            webpack)
              export IS_WEBPACK_TEST=1
              ;;
            turbopack)
              export IS_TURBOPACK_TEST=1
              ;;
            next-default)
              ;;
            *)
              echo "::error::Unsupported BRRRD_HARNESS_BUNDLER: $BRRRD_HARNESS_BUNDLER"
              exit 1
              ;;
          esac
          node run-tests.js --timings -g "$NEXT_TEST_GROUP" -c 2 --type e2e 2>&1 \
            | tee "$GITHUB_WORKSPACE/next-adapter-harness.log"

      - name: Collect harness diagnostics
        if: always()
        working-directory: nextjs
        run: |
          sanitize_diagnostic_path() {
            local path="$1"
            path="${path#.}"
            path="${path#./}"
            path="${path#/}"
            path="${path//\/./\/}"
            printf '%s\n' "$path"
          }

          mkdir -p "$GITHUB_WORKSPACE/harness-diagnostics"
          if [ -f "$GITHUB_WORKSPACE/next-adapter-harness.log" ]; then
            cp "$GITHUB_WORKSPACE/next-adapter-harness.log" "$GITHUB_WORKSPACE/harness-diagnostics/next-adapter-harness.log"
          fi

          while IFS= read -r -d '' file; do
            dest="$GITHUB_WORKSPACE/harness-diagnostics/$(sanitize_diagnostic_path "$file")"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
            echo "::group::$file"
            tail -200 "$file" || true
            echo "::endgroup::"
          done < <(find . -type f \( -name '.adapter-build.log' -o -name '.adapter-server.log' -o -path '*/.brrrd-harness/deployment.json' \) -print0)

          while IFS= read -r -d '' file; do
            dest="$GITHUB_WORKSPACE/harness-diagnostics/tmp-next-tests/$(sanitize_diagnostic_path "${file#/tmp/}")"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
            echo "::group::$file"
            tail -200 "$file" || true
            echo "::endgroup::"
          done < <(find /tmp -maxdepth 4 -type f \( -name '.adapter-build.log' -o -name '.adapter-server.log' -o -path '*/.brrrd-harness/deployment.json' \) -print0 2>/dev/null || true)

      - name: Upload harness diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-adapter-harness-${{ needs.plan.outputs.bundler }}-${{ matrix.shard.label }}
          path: harness-diagnostics
          if-no-files-found: ignore
